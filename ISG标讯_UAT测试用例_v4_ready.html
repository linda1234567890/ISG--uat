<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISG标讯 UAT测试用例目录（优化版）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f0f4f8;
    color: #1a2332;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f2744 0%, #1a4480 60%, #1e5799 100%);
    padding: 28px 40px 22px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(15,39,68,0.35);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .header-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: #a8d4ff;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .version-badge {
    background: rgba(34,197,94,0.2);
    border: 1px solid rgba(34,197,94,0.35);
    color: #86efac;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .header h1 {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .header-sub {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-top: 2px;
  }

  /* Controls bar */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 300px;
  }
  .search-wrap svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.5;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    padding: 7px 12px 7px 34px;
    outline: none;
    transition: all 0.2s;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.4); }
  .search-input:focus {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.4);
  }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .chip {
    cursor: pointer;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 12px;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.65);
    background: rgba(255,255,255,0.07);
    transition: all 0.18s;
    user-select: none;
    white-space: nowrap;
  }
  .chip:hover { border-color: rgba(255,255,255,0.45); color: #fff; background: rgba(255,255,255,0.13); }
  .chip.active { background: #fff; border-color: #fff; color: #0f2744; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 8px;
    padding: 12px 40px;
    background: #e8eef5;
    border-bottom: 1px solid #d0dae6;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #4a6080;
  }
  .stat-num {
    font-size: 15px;
    font-weight: 700;
    color: #1a4480;
  }
  .stat-sep { color: #c0cdd8; margin: 0 4px; }

  /* Optimization note */
  .opt-note {
    background: #fff;
    border: 1px solid #e2eaf3;
    border-left: 3px solid #1a4480;
    border-radius: 0 8px 8px 0;
    padding: 10px 16px;
    margin: 0 40px 0;
    font-size: 12px;
    color: #4a6080;
    line-height: 1.8;
  }
  .opt-note strong { color: #1a2332; }

  /* Main content */
  .main { padding: 20px 40px 40px; }

  /* Role section */
  .role-section {
    margin-bottom: 32px;
  }
  .role-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .role-icon {
    width: 34px; height: 34px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .role-title {
    font-size: 14px;
    font-weight: 700;
    color: #1a2332;
  }
  .role-subtitle {
    font-size: 11px;
    color: #7a94b0;
    margin-left: 2px;
    font-weight: 400;
  }
  .role-count {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 12px;
    margin-left: auto;
  }

  /* Category grouping within a role */
  .cat-label {
    font-size: 11px;
    font-weight: 700;
    color: #94a3b8;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0 2px;
    margin: 14px 0 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e2eaf3;
  }

  /* Cards grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #e2eaf3;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .card:hover {
    border-color: #b8cfe8;
    box-shadow: 0 3px 12px rgba(26,68,128,0.08);
    transform: translateY(-1px);
  }
  .card.expanded {
    border-color: #1a4480;
    box-shadow: 0 5px 20px rgba(26,68,128,0.12);
  }

  /* Core badge */
  .core-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 1px 6px;
    border-radius: 3px;
    background: #fef3c7;
    color: #b45309;
    margin-left: 4px;
    vertical-align: middle;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 7px;
  }
  .tc-id {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #1a2332;
    line-height: 1.45;
    flex: 1;
  }

  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 0;
  }
  .meta-tag {
    font-size: 10.5px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
  }

  /* Expanded detail */
  .card-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #eef2f7;
  }
  .card.expanded .card-detail { display: block; }

  .detail-section {
    margin-bottom: 10px;
  }
  .detail-label {
    font-size: 10.5px;
    font-weight: 700;
    color: #7a94b0;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .detail-content {
    font-size: 12.5px;
    color: #2d4060;
    line-height: 1.65;
    white-space: pre-line;
  }
  .detail-content .field-tag {
    display: inline-block;
    background: #eff6ff;
    color: #1d4ed8;
    border-radius: 3px;
    padding: 0 5px;
    font-size: 11px;
    margin: 1px;
  }
  .field-tbd {
    display: inline-block;
    background: #fff7ed;
    color: #c2410c;
    border-radius: 3px;
    padding: 0 5px;
    font-size: 11px;
    border: 1px dashed #fed7aa;
  }

  /* Color themes per role */
  .theme-0 .card::before { background: #3b82f6; }
  .theme-0 .role-icon { background: #eff6ff; }
  .theme-0 .tc-id { background: #eff6ff; color: #1d4ed8; }
  .theme-0 .role-count { background: #dbeafe; color: #1d4ed8; }

  .theme-1 .card::before { background: #8b5cf6; }
  .theme-1 .role-icon { background: #f5f3ff; }
  .theme-1 .tc-id { background: #f5f3ff; color: #6d28d9; }
  .theme-1 .role-count { background: #ede9fe; color: #6d28d9; }

  .theme-2 .card::before { background: #06b6d4; }
  .theme-2 .role-icon { background: #ecfeff; }
  .theme-2 .tc-id { background: #ecfeff; color: #0e7490; }
  .theme-2 .role-count { background: #cffafe; color: #0e7490; }

  .theme-3 .card::before { background: #f59e0b; }
  .theme-3 .role-icon { background: #fffbeb; }
  .theme-3 .tc-id { background: #fffbeb; color: #b45309; }
  .theme-3 .role-count { background: #fef3c7; color: #b45309; }

  .theme-4 .card::before { background: #10b981; }
  .theme-4 .role-icon { background: #ecfdf5; }
  .theme-4 .tc-id { background: #ecfdf5; color: #065f46; }
  .theme-4 .role-count { background: #d1fae5; color: #065f46; }

  .theme-5 .card::before { background: #ef4444; }
  .theme-5 .role-icon { background: #fef2f2; }
  .theme-5 .tc-id { background: #fef2f2; color: #b91c1c; }
  .theme-5 .role-count { background: #fee2e2; color: #b91c1c; }

  .theme-6 .card::before { background: #ec4899; }
  .theme-6 .role-icon { background: #fdf2f8; }
  .theme-6 .tc-id { background: #fdf2f8; color: #9d174d; }
  .theme-6 .role-count { background: #fce7f3; color: #9d174d; }

  .theme-7 .card::before { background: #64748b; }
  .theme-7 .role-icon { background: #f8fafc; }
  .theme-7 .tc-id { background: #f1f5f9; color: #334155; }
  .theme-7 .role-count { background: #e2e8f0; color: #334155; }

  .tag-s1 { background: #eff6ff; color: #3b82f6; }
  .tag-s2 { background: #f0fdf4; color: #16a34a; }
  .tag-s3 { background: #fdf4ff; color: #a855f7; }
  .tag-s4 { background: #fff7ed; color: #ea580c; }
  .tag-terminal { background: #f1f5f9; color: #64748b; }
  .tag-extra { background: #fef3c7; color: #b45309; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #94a3b8;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .hidden { display: none !important; }

  .chevron {
    margin-left: auto;
    flex-shrink: 0;
    color: #b0bec5;
    transition: transform 0.2s;
    font-size: 12px;
    margin-top: 2px;
  }
  .card.expanded .chevron { transform: rotate(180deg); color: #1a4480; }

  /* opt info bar */
  .opt-bar {
    background: #f0f7ff;
    border-bottom: 1px solid #d0dae6;
    padding: 10px 40px;
    font-size: 11.5px;
    color: #4a6080;
    line-height: 1.7;
  }
  .opt-bar span { color: #1a4480; font-weight: 600; }

  /* Role info panel */
  .role-info {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
    padding: 12px 14px;
    background: #f8fafc;
    border: 1px solid #e2eaf3;
    border-radius: 8px;
  }
  .role-info-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .role-info-label {
    font-size: 10px;
    font-weight: 700;
    color: #94a3b8;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .role-info-value {
    font-size: 12px;
    color: #2d4060;
    line-height: 1.5;
  }
  .role-info-link {
    font-size: 12px;
    color: #1a4480;
    text-decoration: none;
    word-break: break-all;
  }
  .role-info-link:hover { text-decoration: underline; }
  .role-info-download {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    background: #1a4480;
    border-radius: 5px;
    padding: 3px 10px;
    text-decoration: none;
    transition: background 0.15s;
    width: fit-content;
  }
  .role-info-download:hover { background: #0f2744; }

  @media (max-width: 640px) {
    .header { padding: 18px 16px 14px; }
    .stats-bar, .opt-bar { padding: 10px 16px; }
    .opt-note { margin: 0 16px; }
    .main { padding: 14px 16px 32px; }
    .cards-grid { grid-template-columns: 1fr; }
    .role-info { grid-template-columns: 1fr 1fr; }
  }

  /* Result status styles */
  .result-pass { color: #16a34a !important; }
  .result-fail { color: #dc2626 !important; }
  .result-block { color: #d97706 !important; }
  .result-skip { color: #64748b !important; }

  .result-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #eef2f7;
    flex-wrap: wrap;
  }
  .result-label {
    font-size: 10.5px;
    font-weight: 700;
    color: #7a94b0;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .result-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 5px;
    border: 1.5px solid transparent;
    cursor: pointer;
    background: #f1f5f9;
    color: #64748b;
    transition: all 0.15s;
    user-select: none;
  }
  .result-btn:hover { opacity: 0.85; }
  .result-btn.active-pass { background: #dcfce7; color: #16a34a; border-color: #86efac; }
  .result-btn.active-fail { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .badge-pass { background: #dcfce7; color: #16a34a; }
  .badge-fail { background: #fee2e2; color: #dc2626; }
  .badge-pending { background: #f1f5f9; color: #94a3b8; }

  /* Remark textarea */
  .remark-area {
    width: 100%;
    margin-top: 8px;
    font-size: 12px;
    color: #2d4060;
    border: 1px solid #e2eaf3;
    border-radius: 5px;
    padding: 6px 8px;
    resize: vertical;
    min-height: 40px;
    font-family: inherit;
    background: #fafbfc;
    outline: none;
    transition: border-color 0.15s;
    display: none;
  }
  .remark-area.visible { display: block; }
  .remark-area:focus { border-color: #1a4480; background: #fff; }

  /* Storage status */
  .storage-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #94a3b8;
    margin-left: auto;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
  }
  .storage-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #94a3b8;
    flex-shrink: 0;
  }
  .storage-dot.ok { background: #4ade80; }
  .storage-dot.saving { background: #fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Export button */
  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.15s;
  }
  .export-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
        <span class="header-badge">UAT</span>
        <span class="version-badge">优化版 v3</span>
        <h1>ISG 智能标讯 · 测试用例目录</h1>
      </div>
      <div class="header-sub" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span>点击用例卡片展开详情 · 支持按角色、场景筛选和关键词搜索</span>
        <span class="storage-status" id="storageStatus"><span class="storage-dot" id="storageDot"></span><span id="storageText">连接中…</span></span>
      </div>
    </div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="white"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" placeholder="搜索用例ID、标题…" oninput="filterAll()">
    </div>
    <div class="filter-group" id="roleFilters"></div>
    <button class="export-btn" onclick="exportResults()">📊 导出结果</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><span class="stat-num" id="countShown">—</span>&nbsp;条用例</div>
  <span class="stat-sep">·</span>
  <div class="stat-item"><span class="stat-num">8</span>&nbsp;个角色</div>
  <span class="stat-sep">·</span>
  <div class="stat-item">🌟 <span class="stat-num" id="countCore">—</span>&nbsp;核心三项</div>
  <span class="stat-sep">·</span>
  <div class="stat-item">✅ <span class="stat-num result-pass" id="countPass">0</span>&nbsp;通过</div>
  <span class="stat-sep">·</span>
  <div class="stat-item">❌ <span class="stat-num result-fail" id="countFail">0</span>&nbsp;失败</div>
  <span class="stat-sep">·</span>
  <div class="stat-item">⬜ <span class="stat-num" id="countPending" style="color:#94a3b8">—</span>&nbsp;待测试</div>
</div>



<div class="main" id="mainContent"></div>

<script>
// ============================================================
// DATA — optimized UAT test cases
// ============================================================
const DATA = [

  // ── 总部运营 ────────────────────────────────────────────
  {role:"总部运营", tc_id:"TC-HQ-001", scenario:"S1 标讯接入与管理", cat:"基础三项",
   title:"总部运营-查看标讯列表及详情（字段核查）",
   precondition:"用户已登录，具有总部运营角色权限，标讯数据已入库",
   data_needed:"总部运营测试账号；多条标讯测试数据；已确认字段：标讯编号、项目名称、采购单位、类型、战区、BU、主行业、预算(万)、关联商机编号、状态、截止时间、操作",
   steps:"1. 总部运营账号登录，进入标讯列表\n2. 确认列表字段包含：标讯编号、项目名称、采购单位、类型、战区、BU、主行业、预算(万)、关联商机编号、状态、截止时间、操作\n3. 点击任意标讯查看详情页\n4. 逐项核对详情页字段：标讯编号、项目名称、采购单位、类型、战区、BU、主行业、预算(万)、关联商机编号、状态、截止时间、操作",
   expected:"1. 标讯列表正常展示，可见全量数据（总部权限）\n2. 列表字段完整包含：标讯编号、项目名称、采购单位、类型、战区、BU、主行业、预算(万)、关联商机编号、状态、截止时间、操作\n3. 详情页字段完整，含：标讯编号、项目名称、采购单位、类型、战区、BU、主行业、预算(万)、关联商机编号、状态、截止时间、操作\n4. 无多余字段、无缺漏字段",
   field_note:"已确认字段：标讯编号、项目名称、采购单位、类型、战区、BU、主行业、预算(万)、关联商机编号、状态、截止时间、操作",

const GAS_URL = 'https://script.google.com/macros/s/AKfycbw_DoUuj1Dh6O1rXv2wU2GkW7NEF-uNNa8fdqzOk1PHqPWHpPTk_IShI6Ihcr886PBT/exec';

// ============================================================
// STATE
// ============================================================
let results = {};   // { tc_id: { status:'pass'|'fail'|'', remark:'' } }
let saveQueue = {}; // pending writes
let saveTimer = null;

// ── Storage status indicator ──────────────────────────────
function setStorageStatus(state) {
  const dot = document.getElementById('storageDot');
  const txt = document.getElementById('storageText');
  if (!dot || !txt) return;
  if (state === 'ok')     { dot.className='storage-dot ok';     txt.textContent='已同步 Google Sheets'; }
  else if (state==='saving') { dot.className='storage-dot saving'; txt.textContent='同步中…'; }
  else if (state==='err') { dot.className='storage-dot';        txt.textContent='同步失败（已本地缓存）'; }
  else if (state==='cfg') { dot.className='storage-dot';        txt.textContent='未配置 GAS URL'; }
  else                    { dot.className='storage-dot';        txt.textContent=state; }
}

// ── Load all results from GAS on startup ─────────────────
async function loadResults() {
  if (!GAS_URL) {
    setStorageStatus('cfg');
    // fallback: localStorage
    try { const ls = localStorage.getItem('uat-results'); if(ls) results = JSON.parse(ls); } catch(e){}
    updateStats(); return;
  }
  setStorageStatus('同步中…');
  try {
    const res = await fetch(GAS_URL + '?action=getAll', { method:'GET' });
    const data = await res.json();
    if (data && data.results) results = data.results;
    setStorageStatus('ok');
  } catch(e) {
    setStorageStatus('err');
    try { const ls = localStorage.getItem('uat-results'); if(ls) results = JSON.parse(ls); } catch(e2){}
  }
  updateStats();
}

// ── Write one row to GAS (debounced) ─────────────────────
async function flushSave() {
  if (!GAS_URL) {
    try { localStorage.setItem('uat-results', JSON.stringify(results)); } catch(e){}
    return;
  }
  const payload = Object.assign({}, saveQueue);
  saveQueue = {};
  setStorageStatus('saving');
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action:'upsertRows', rows: payload })
    });
    localStorage.setItem('uat-results', JSON.stringify(results)); // local mirror
    setStorageStatus('ok');
  } catch(e) {
    setStorageStatus('err');
    // re-queue
    Object.assign(saveQueue, payload);
    try { localStorage.setItem('uat-results', JSON.stringify(results)); } catch(e2){}
  }
}

function scheduleSave(tcId) {
  saveQueue[tcId] = results[tcId];
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 900);
}

// ── Badge helpers ─────────────────────────────────────────
function getBadge(val) {
  if (val === 'pass') return '<span class="result-badge badge-pass">✅ 通过</span>';
  if (val === 'fail') return '<span class="result-badge badge-fail">❌ 失败</span>';
  return '<span class="result-badge badge-pending">待测试</span>';
}

// ── Set result on button click ────────────────────────────
function setResult(tcId, status) {
  if (!results[tcId]) results[tcId] = { status:'', remark:'' };
  results[tcId].status = (results[tcId].status === status) ? '' : status; // toggle
  scheduleSave(tcId);

  const card = document.getElementById('card-' + tcId);
  if (card) {
    const newVal = results[tcId].status;
    card.querySelectorAll('.result-btn').forEach(b => {
      b.className = 'result-btn';
      if (newVal === 'pass' && b.dataset.val === 'pass') b.className = 'result-btn active-pass';
      if (newVal === 'fail' && b.dataset.val === 'fail') b.className = 'result-btn active-fail';
    });
    const title = card.querySelector('.card-title');
    if (title) {
      title.querySelectorAll('.result-badge').forEach(b => b.remove());
      title.insertAdjacentHTML('beforeend', getBadge(newVal));
    }
    const remark = document.getElementById('remark-' + tcId);
    if (remark) remark.classList.toggle('visible', !!newVal);
  }
  updateStats();
}

// ── Save remark ───────────────────────────────────────────
function saveRemark(tcId, val) {
  if (!results[tcId]) results[tcId] = { status:'', remark:'' };
  results[tcId].remark = val;
  scheduleSave(tcId);
}

// ── Stats bar ─────────────────────────────────────────────
function updateStats() {
  let pass=0, fail=0, pending=0;
  const total = DATA.length;
  DATA.forEach(d => {
    const s = (results[d.tc_id] || {}).status;
    if (s === 'pass') pass++;
    else if (s === 'fail') fail++;
    else pending++;
  });
  const el = id => document.getElementById(id);
  if(el('countPass'))    el('countPass').textContent    = pass;
  if(el('countFail'))    el('countFail').textContent    = fail;
  if(el('countPending')) el('countPending').textContent = pending;
}

// ── Export CSV ────────────────────────────────────────────
function exportResults() {
  const rows = [['用例ID','标题','角色','场景','测试结果','备注']];
  DATA.forEach(d => {
    const r = results[d.tc_id] || {};
    const statusMap = { pass:'通过', fail:'失败', '':'待测试' };
    rows.push([d.tc_id, d.title, d.role, d.scenario||'', statusMap[r.status||'']||'待测试', r.remark||'']);
  });
  const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ISG_UAT测试结果_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.csv';
  a.click();
}

let activeRole = '全部';

function buildFilters() {
  const rf = document.getElementById('roleFilters');
  ROLES.forEach((r, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (r === '全部' ? ' active' : '');
    chip.textContent = (i > 0 ? ROLE_ICONS[i] + ' ' : '') + r;
    chip.onclick = () => { activeRole = r; updateChips(rf, chip); filterAll(); };
    rf.appendChild(chip);
  });
}

function updateChips(container, active) {
  container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  active.classList.add('active');
}

function filterAll() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = DATA.filter(d => {
    if (activeRole !== '全部' && d.role !== activeRole) return false;
    if (q && !d.tc_id.toLowerCase().includes(q) && !d.title.toLowerCase().includes(q) && !d.role.toLowerCase().includes(q)) return false;
    return true;
  });
  renderCards(filtered);
}

function scenarioClass(sc) {
  if (!sc) return '';
  if (sc.includes('S1')) return 'tag-s1';
  if (sc.includes('S2')) return 'tag-s2';
  if (sc.includes('S3')) return 'tag-s3';
  if (sc.includes('S4')) return 'tag-s4';
  return '';
}

  document.getElementById('countCore').textContent = coreCount;

  if (filtered.length === 0) {
    main.innerHTML = '<div class="empty"><div class="empty-icon">🔎</div><div style="font-size:15px;color:#94a3b8;">没有符合条件的测试用例</div></div>';
    return;
  }

  const grouped = {};
  filtered.forEach(d => {
    if (!grouped[d.role]) grouped[d.role] = [];
    grouped[d.role].push(d);
  });

  const roleOrder = ROLES.slice(1);
  let html = '';
  roleOrder.forEach((role, ri) => {
    if (!grouped[role]) return;
    const items = grouped[role];
    const theme = `theme-${ri % 8}`;
    const icon = ROLE_ICONS[ri + 1] || '👤';

    // Group by cat within role
    const catMap = {};
    items.forEach(d => {
      const c = d.cat || '其他';
      if (!catMap[c]) catMap[c] = [];
      catMap[c].push(d);
    });

    let catHtml = '';
    for (const [cat, catItems] of Object.entries(catMap)) {
      const cards = catItems.map(d => {
        const isCore = isCoreCase(d);
        const fieldNote = '';
        const extraTag = d.cat && d.cat.includes('额外') ? `<span class="meta-tag tag-extra">🔑 额外操作</span>` : '';
        const coreBadge = isCore ? `<span class="core-badge">★ 核心</span>` : '';
        const r = results[d.tc_id] || {};
        const resultVal = r.status || '';
        const resultBadge = resultVal ? getBadge(resultVal) : '<span class="result-badge badge-pending">待测试</span>';
        const remarkVal = r.remark || '';
        const remarkVisible = resultVal ? 'visible' : '';
        return `
          <div class="card" id="card-${d.tc_id}" onclick="toggleCard(this)">
            <div class="card-top">
              <span class="tc-id">${d.tc_id}</span>
              <span class="card-title">${d.title}${coreBadge}${resultBadge}</span>
              <span class="chevron">▾</span>
            </div>
            <div class="card-meta">
              ${d.scenario ? `<span class="meta-tag ${scenarioClass(d.scenario)}">${d.scenario}</span>` : ''}
              ${extraTag}
              ${d.terminal ? `<span class="meta-tag tag-terminal">📱 ${d.terminal}</span>` : ''}
            </div>
            <div class="card-detail">
              ${d.precondition ? `<div class="detail-section"><div class="detail-label">前置条件</div><div class="detail-content">${d.precondition}</div></div>` : ''}

              ${d.steps ? `<div class="detail-section"><div class="detail-label">测试步骤</div><div class="detail-content">${d.steps}</div></div>` : ''}
              ${d.expected ? `<div class="detail-section"><div class="detail-label">预期结果</div><div class="detail-content">${d.expected}</div></div>` : ''}
              <div class="result-bar" onclick="event.stopPropagation()">
                <span class="result-label">测试结果</span>
                <button class="result-btn ${resultVal==='pass'?'active-pass':''}" data-val="pass" onclick="setResult('${d.tc_id}','pass')">✅ 通过</button>
                <button class="result-btn ${resultVal==='fail'?'active-fail':''}" data-val="fail" onclick="setResult('${d.tc_id}','fail')">❌ 失败</button>
              </div>
              <textarea class="remark-area ${remarkVisible}" id="remark-${d.tc_id}" placeholder="备注（问题描述、缺陷编号等）…" onclick="event.stopPropagation()" oninput="saveRemark('${d.tc_id}',this.value)">${remarkVal}</textarea>
            </div>
          </div>
        `;
      }).join('');

      catHtml += `
        <div class="cat-label">${cat}</div>
        <div class="cards-grid">${cards}</div>
      `;
    }

    // Role subtitle logic
    let subtitle = '';
    if (role === '战区销管') subtitle = '（内容同战区Leader，额外含分派操作）';
    if (role === '产品经理') subtitle = '（case类似区域销管，可见数据范围不同：产品维度）';
    if (role === '区域销管') subtitle = '（case类似产品经理，可见数据范围不同：区域维度）';

    const meta = ROLE_META[role] || {};
    const roleInfoHtml = `
      <div class="role-info">
        <div class="role-info-item">
          <span class="role-info-label">⚡ 能力展示</span>
          <span class="role-info-value">${meta.abilities || '待填写'}</span>
        </div>
        <div class="role-info-item">
          <span class="role-info-label">👤 测试人员</span>
          <span class="role-info-value" contenteditable="true" style="outline:none;border-bottom:1px dashed #c0cdd8;min-width:60px;">${meta.testers || '待填写'}</span>
        </div>
        <div class="role-info-item">
          <span class="role-info-label">🔗 测试地址</span>
          <a class="role-info-link" href="${meta.testUrl || '#'}" target="_blank">${meta.testUrl || '待填写'}</a>
        </div>
        <div class="role-info-item">
          <span class="role-info-label">📥 测试数据下载</span>
          <a class="role-info-download" href="${meta.dataDownload || '#'}" target="_blank">⬇ 下载测试数据</a>
        </div>
      </div>
    `;

    html += `
      <div class="role-section ${theme}">
        <div class="role-header">
          <div class="role-icon">${icon}</div>
          <span class="role-title">👤 ${role}</span>
          ${subtitle ? `<span class="role-subtitle">${subtitle}</span>` : ''}
          <span class="role-count">${items.length} 条用例</span>
        </div>
        ${roleInfoHtml}
        ${catHtml}
      </div>
    `;
  });

  main.innerHTML = html;
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

buildFilters();
loadResults().then(() => filterAll());
</script>

<!-- ================================================================
  GOOGLE APPS SCRIPT 配置指南
  ================================================================
  第一步：打开 Google Sheets，新建一个表格，重命名 Sheet1 为 "Results"
          第一行填写表头：A1=tc_id  B1=status  C1=remark  D1=updated_at  E1=updater

  第二步：在 Google Sheets 菜单 → 扩展程序 → Apps Script，粘贴以下代码：

  ─────────────────────────────────────────────────────────────────
  const SHEET_NAME = 'Results';
  const ss = SpreadsheetApp.getActiveSpreadsheet();

  function doGet(e) {
    const action = e.parameter.action;
    if (action === 'getAll') return getAll();
    return ContentService.createTextOutput('ok');
  }

  function doPost(e) {
    const body = JSON.parse(e.postData.contents);
    if (body.action === 'upsertRows') upsertRows(body.rows);
    return ContentService.createTextOutput('ok')
      .setMimeType(ContentService.MimeType.JSON);
  }

  function getAll() {
    const sheet = ss.getSheetByName(SHEET_NAME);
    const rows = sheet.getDataRange().getValues();
    const results = {};
    for (let i = 1; i < rows.length; i++) {
      const [tc_id, status, remark] = rows[i];
      if (tc_id) results[tc_id] = { status: status || '', remark: remark || '' };
    }
    return ContentService.createTextOutput(JSON.stringify({ results }))
      .setMimeType(ContentService.MimeType.JSON);
  }

  function upsertRows(rows) {
    const sheet = ss.getSheetByName(SHEET_NAME);
    const data = sheet.getDataRange().getValues();
    const idxMap = {};
    for (let i = 1; i < data.length; i++) idxMap[data[i][0]] = i + 1;
    const now = new Date().toLocaleString('zh-CN');
    Object.entries(rows).forEach(([tcId, r]) => {
      const row = [tcId, r.status || '', r.remark || '', now, ''];
      if (idxMap[tcId]) {
        sheet.getRange(idxMap[tcId], 1, 1, 5).setValues([row]);
      } else {
        sheet.appendRow(row);
      }
    });
  }
